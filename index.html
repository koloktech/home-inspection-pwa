<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Home Inspection CRM
</title>


<link rel="manifest" href="manifest.json">


<link rel="stylesheet"
href="style.css">



<!-- Full Calendar -->

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
rel="stylesheet">



</head>


<body>


<div class="app">


<!-- SIDEBAR -->

<nav id="sidebar">


<h2>
🏠 Inspection CRM
</h2>


<button onclick="showPage('dashboardPage')">
Dashboard
</button>


<button onclick="showPage('newPage')">
+ New Order
</button>


<button onclick="showPage('ordersPage')">
Orders
</button>


<button onclick="showPage('calendarPage')">
Calendar
</button>


<button onclick="showPage('paymentPage')">
Payments
</button>



</nav>





<!-- MAIN -->


<main>



<!-- ===================
 DASHBOARD
==================== -->


<section id="dashboardPage"
class="page">


<h1>
Dashboard
</h1>



<div class="cards">


<div class="card">

<h3>
Total Jobs
</h3>

<p id="totalJobs">
0
</p>

</div>




<div class="card">

<h3>
Sales
</h3>

<p>
RM
<span id="sales">
0
</span>
</p>

</div>





<div class="card">

<h3>
Collected
</h3>

<p>
RM
<span id="collected">
0
</span>
</p>

</div>





<div class="card">

<h3>
Outstanding
</h3>

<p>
RM
<span id="outstanding">
0
</span>
</p>

</div>


</div>





<h2>
Upcoming Inspection
</h2>



<div id="upcomingList">

</div>



</section>








<!-- ===================
 NEW ORDER
==================== -->

<section id="newPage"
class="page hidden">


<h1>
New Inspection Order
</h1>



<textarea
id="message"
placeholder="
Paste customer WhatsApp message here
">
</textarea>


<button onclick="parseMessage()">
Extract Details
</button>




<div class="form-grid">


<input id="name"
placeholder="Customer Name">


<input id="phone1"
placeholder="Phone 1">


<input id="phone2"
placeholder="Phone 2">


<input id="address"
placeholder="Address">


<input id="unit"
placeholder="Unit">


<input id="size"
placeholder="Built Up Size">


<input id="property"
placeholder="Property Type">


<input id="developer"
placeholder="Developer">


<input id="date"
placeholder="Inspection Date">


<input id="time"
placeholder="Inspection Time">



<select id="package">

<option>
Basic
</option>

<option>
Plus
</option>


</select>




<textarea
id="notes"
placeholder="Notes">
</textarea>


</div>



<button onclick="saveOrder()">
Save Order
</button>


</section>









<!-- ===================
 ORDERS
==================== -->


<section id="ordersPage"
class="page hidden">


<h1>
Orders
</h1>



<input
id="search"
placeholder="Search customer..."
onkeyup="loadOrders()">



<div id="ordersTable">

</div>



</section>









<!-- ===================
 CALENDAR
==================== -->


<section id="calendarPage"
class="page hidden">


<h1>
Inspection Calendar
</h1>



<div id="calendar">

</div>



</section>









<!-- ===================
 PAYMENTS
==================== -->


<section id="paymentPage"
class="page hidden">


<h1>
Payments
</h1>



<p>
Payments recorded against inspection orders.
</p>

<div id="paymentsTable">
</div>


</section>





</main>


</div>









<!-- ===================
 EDIT MODAL
==================== -->



<div id="editModal"
class="modal hidden">


<div class="modal-box">


<h2>
Edit Order
</h2>


<input id="editID"
readonly>



<input id="editName"
placeholder="Name">


<input id="editPhone"
placeholder="Phone">


<input id="editPackage"
placeholder="Package">


<input id="editDate"
placeholder="Inspection Date">


<select id="editStatus">


<option>
Scheduled
</option>


<option>
Completed
</option>


<option>
Cancelled
</option>


</select>



<button onclick="updateOrder()">
Save Changes
</button>



<button onclick="closeModal()">
Cancel
</button>


</div>


</div>








<!-- PAYMENT MODAL -->


<div id="paymentModal"
class="modal hidden">


<div class="modal-box">


<h2>
Add Payment
</h2>



<input id="paymentOrderID"
readonly>



<input id="paymentAmount"
placeholder="Amount">


<select id="paymentMethod">


<option>
Bank Transfer
</option>


<option>
Cash
</option>


<option>
Online Banking
</option>


</select>




<textarea
id="paymentNote"
placeholder="Notes">
</textarea>



<button onclick="savePayment()">
Save Payment
</button>



<button onclick="closePayment()">
Cancel
</button>


</div>


</div>







<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js">
</script>



<script src="app.js"></script>


<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}

</script>


</body>


</html>
